# 收入查询模板
# 覆盖：单日/多日收入、按渠道/新老客拆分、同比环比

templates:
  - id: revenue_daily
    name: 单日收入查询
    keywords: [收入, 销售额, 营收, 业绩, 昨天, 今天, 单日]
    params:
      - name: date
        type: date
        required: false
        default: yesterday
        description: 查询日期，默认昨天
      - name: customer_type
        type: enum
        options: [all, new, old]
        default: all
        mapping:
          all: "1=1"
          new: "is_new = 1"
          old: "is_new = 0"
      - name: channel_level
        type: enum
        options: [first, second]
        default: second
    sql: |
      SELECT
          COUNT(DISTINCT customer_id)                   AS customers,
          COUNT(DISTINCT order_id)                      AS orders,
          COUNT(DISTINCT verify_date_id)                AS visits,
          SUM(exe_cnt)                                  AS svc_points,
          ROUND(SUM(exe_income), 2)                     AS income,
          ROUND(SUM(exe_income) / NULLIF(COUNT(DISTINCT verify_date_id), 0), 2) AS asp
      FROM soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE dp = '{{ latest_dp }}'
        AND executed_date = '{{ date }}'
        AND is_valid = 1
        AND {{ customer_type }}
    output:
      type: card
      title: "收入 · {{ date }}"

  - id: revenue_range
    name: 时间段收入查询
    keywords: [近, 月, 周, 季度, 期间, 时间段, 范围]
    params:
      - name: start_date
        type: date
        required: true
        description: 开始日期
      - name: end_date
        type: date
        required: false
        default: today
        description: 结束日期
      - name: customer_type
        type: enum
        options: [all, new, old]
        default: all
        mapping:
          all: "1=1"
          new: "is_new = 1"
          old: "is_new = 0"
      - name: group_by
        type: enum
        options: [month, week, day, channel, product]
        default: month
    sql: |
      SELECT
          {% if group_by == 'month' %}
          SUBSTR(executed_date, 1, 7) AS period,
          {% elif group_by == 'channel' %}
          COALESCE(cx_second_channel, 'NA') AS period,
          {% elif group_by == 'product' %}
          COALESCE(product_name, 'NA') AS period,
          {% else %}
          executed_date AS period,
          {% endif %}
          COUNT(DISTINCT customer_id)                   AS customers,
          COUNT(DISTINCT order_id)                      AS orders,
          ROUND(SUM(exe_income), 2)                     AS income,
          ROUND(SUM(exe_income) / NULLIF(COUNT(DISTINCT verify_date_id), 0), 2) AS asp
      FROM soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE dp = '{{ latest_dp }}'
        AND executed_date >= '{{ start_date }}'
        AND executed_date <= '{{ end_date }}'
        AND is_valid = 1
        AND {{ customer_type }}
      GROUP BY period
      ORDER BY income DESC
      LIMIT 100
    output:
      type: card
      title: "收入趋势 · {{ start_date }} ~ {{ end_date }}"

  - id: revenue_channel
    name: 渠道收入分布
    keywords: [渠道, 私域, 公域, 老带新, 渠道分布, 渠道分析]
    params:
      - name: start_date
        type: date
        required: false
        default: "90_days_ago"
      - name: end_date
        type: date
        required: false
        default: yesterday
      - name: channel_level
        type: enum
        options: [first, second, third]
        default: second
        mapping:
          first: "cx_first_channel"
          second: "cx_second_channel"
          third: "cx_third_channel"
    sql: |
      SELECT
          COALESCE({{ channel_level }}, 'NA')           AS channel,
          COUNT(DISTINCT customer_id)                   AS customers,
          COUNT(DISTINCT order_id)                      AS orders,
          ROUND(SUM(exe_income), 2)                     AS income,
          ROUND(SUM(exe_income) / NULLIF(COUNT(DISTINCT verify_date_id), 0), 2) AS asp
      FROM soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE dp = '{{ latest_dp }}'
        AND executed_date >= '{{ start_date }}'
        AND executed_date <= '{{ end_date }}'
        AND is_valid = 1
      GROUP BY {{ channel_level }}
      ORDER BY income DESC
      LIMIT 100
    output:
      type: card
      title: "渠道收入分布 · {{ start_date }} ~ {{ end_date }}"
